name: CD — Train & Deploy to SageMaker

on:
  push:
    branches: [main]

concurrency:
  group: cd-sagemaker
  cancel-in-progress: true

jobs:
  train:
    name: SageMaker Training Job
    runs-on: ubuntu-latest
    outputs:
      model_artifact: ${{ steps.run_training.outputs.model_artifact }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ secrets.AWS_REGION }}

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install SageMaker SDK
        run: pip install sagemaker boto3

      - name: Launch SageMaker training job
        id: run_training
        env:
          SAGEMAKER_ROLE_ARN: ${{ secrets.SAGEMAKER_ROLE_ARN }}
          S3_BUCKET: ${{ secrets.S3_BUCKET }}
        run: |
          python deploy/train_sagemaker.py \
            --role "$SAGEMAKER_ROLE_ARN" \
            --s3_bucket "$S3_BUCKET" \
            --job_name "mlops-gpt2-run-${{ github.run_number }}" \
            --epochs 3 \
            --instance_type ml.m5.xlarge

  deploy:
    name: Deploy to SageMaker Endpoint
    runs-on: ubuntu-latest
    needs: train
    outputs:
      endpoint_name: ${{ steps.deploy_model.outputs.endpoint_name }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ secrets.AWS_REGION }}

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install SageMaker SDK
        run: pip install sagemaker boto3

      - name: Deploy model to endpoint
        id: deploy_model
        env:
          SAGEMAKER_ROLE_ARN: ${{ secrets.SAGEMAKER_ROLE_ARN }}
          MODEL_ARTIFACT: ${{ needs.train.outputs.model_artifact }}
        run: |
          python deploy/deploy_sagemaker.py \
            --role "$SAGEMAKER_ROLE_ARN" \
            --model_artifact "$MODEL_ARTIFACT" \
            --endpoint_name "mlops-gpt2-endpoint" \
            --instance_type ml.m5.large \
            --run_number ${{ github.run_number }}
  integration-test:
    name: Endpoint Smoke Test
    runs-on: ubuntu-latest
    needs: deploy

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ secrets.AWS_REGION }}

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install boto3
        run: pip install boto3

      - name: Run smoke tests
        run: |
          python deploy/test_endpoint.py \
            --endpoint_name "mlops-gpt2-endpoint" \
            --region "${{ secrets.AWS_REGION }}"

      - name: Report success
        run: |
          echo "Pipeline complete!"
          echo "Endpoint: mlops-gpt2-endpoint"
          echo "Run: ${{ github.run_number }}"
          echo "Commit: ${{ github.sha }}"